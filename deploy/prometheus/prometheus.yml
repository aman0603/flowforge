global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: flowforge-api
    metrics_path: /metrics
    static_configs:
      - targets: ["app:9091"]
        labels:
          service: flowforge-api

  - job_name: flowforge-scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler:9091"]
        labels:
          service: flowforge-scheduler

  - job_name: flowforge-recovery
    metrics_path: /metrics
    static_configs:
      - targets: ["recovery:9091"]
        labels:
          service: flowforge-recovery

  - job_name: flowforge-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9091"]
        labels:
          service: flowforge-worker

  - job_name: flowforge-publisher
    metrics_path: /metrics
    static_configs:
      - targets: ["publisher:9091"]
        labels:
          service: flowforge-publisher

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
