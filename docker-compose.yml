services:
  db:
    image: postgres:16-alpine
    container_name: flowforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-flowforge}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-flowforge}"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: flowforge-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GRPC_ADDR: "0.0.0.0:9090"
      DB_URL: "${DB_URL:-postgres://postgres:postgres@db:5432/flowforge?sslmode=disable}"
      ENV: "development"
      SCHEMA_PATH: "schema.sql"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "flowforge.workflow-events.v1"
      KAFKA_CLIENT_ID: "flowforge-app"
      METRICS_ADDR: "0.0.0.0:9091"
      OTEL_DISABLED: "false"
      OTEL_SERVICE_NAME: "flowforge-api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./scheduler"]
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    ports:
      - "9091:9090"
    environment:
      GRPC_ADDR: "0.0.0.0:9090"
      DB_URL: "${DB_URL:-postgres://postgres:postgres@db:5432/flowforge?sslmode=disable}"
      METRICS_ADDR: "0.0.0.0:9091"
      OTEL_DISABLED: "false"
      OTEL_SERVICE_NAME: "flowforge-scheduler"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy

  recovery:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./recovery"]
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    ports:
      - "9092:9090"
    environment:
      GRPC_ADDR: "0.0.0.0:9090"
      DB_URL: "${DB_URL:-postgres://postgres:postgres@db:5432/flowforge?sslmode=disable}"
      METRICS_ADDR: "0.0.0.0:9091"
      OTEL_DISABLED: "false"
      OTEL_SERVICE_NAME: "flowforge-recovery"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./worker"]
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      DB_URL: "${DB_URL:-postgres://postgres:postgres@db:5432/flowforge?sslmode=disable}"
      WORKER_POLL_INTERVAL: "${WORKER_POLL_INTERVAL:-1s}"
      CLAIMED_STALE_TIMEOUT: "${CLAIMED_STALE_TIMEOUT:-30s}"
      RUNNING_STALE_TIMEOUT: "${RUNNING_STALE_TIMEOUT:-5m}"
      RECOVERY_INTERVAL: "${RECOVERY_INTERVAL:-30s}"
      REDIS_ADDR: "redis:6379"
      WORKER_HEARTBEAT_INTERVAL_MS: "${WORKER_HEARTBEAT_INTERVAL_MS:-1000}"
      WORKER_HEARTBEAT_TTL_MS: "${WORKER_HEARTBEAT_TTL_MS:-3000}"
      TASK_LEASE_TTL_MS: "${TASK_LEASE_TTL_MS:-5000}"
      TASK_LEASE_RENEW_INTERVAL_MS: "${TASK_LEASE_RENEW_INTERVAL_MS:-1500}"
      WORKER_POOL_SIZE: "${WORKER_POOL_SIZE:-16}"
      WORKER_QUEUE_CAPACITY: "${WORKER_QUEUE_CAPACITY:-32}"
      WORKER_CLAIM_BATCH_SIZE: "${WORKER_CLAIM_BATCH_SIZE:-8}"
      WORKER_SHUTDOWN_GRACE_PERIOD_MS: "${WORKER_SHUTDOWN_GRACE_PERIOD_MS:-10000}"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "flowforge.workflow-events.v1"
      KAFKA_CLIENT_ID: "flowforge-worker"
      SCHEDULER_ADDR: "scheduler:9090"
      RECOVERY_ADDR: "recovery:9090"
      METRICS_ADDR: "0.0.0.0:9091"
      OTEL_DISABLED: "false"
      OTEL_SERVICE_NAME: "flowforge-worker"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      scheduler:
        condition: service_started
      recovery:
        condition: service_started

  publisher:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./publisher"]
    restart: unless-stopped
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    environment:
      DB_URL: "${DB_URL:-postgres://postgres:postgres@db:5432/flowforge?sslmode=disable}"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "flowforge.workflow-events.v1"
      KAFKA_CLIENT_ID: "flowforge-publisher"
      OUTBOX_POLL_INTERVAL: "${OUTBOX_POLL_INTERVAL:-500ms}"
      OUTBOX_BATCH_SIZE: "${OUTBOX_BATCH_SIZE:-100}"
      OUTBOX_CLAIM_TIMEOUT: "${OUTBOX_CLAIM_TIMEOUT:-30s}"
      OUTBOX_MAX_RETRIES: "${OUTBOX_MAX_RETRIES:-5}"
      OUTBOX_RETRY_BASE_DELAY: "${OUTBOX_RETRY_BASE_DELAY:-1s}"
      OUTBOX_RETENTION: "${OUTBOX_RETENTION:-24h}"
      METRICS_ADDR: "0.0.0.0:9091"
      OTEL_DISABLED: "false"
      OTEL_SERVICE_NAME: "flowforge-publisher"
      OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: flowforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.2.0
    container_name: flowforge-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: flowforge-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  pgdata:
