version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: flowforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowforge"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-app
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_URL: "postgres://postgres:postgres@db:5432/flowforge?sslmode=disable"
      ENV: "development"
      SCHEMA_PATH: "schema.sql"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-worker
    command: ["./worker"]
    environment:
      DB_URL: "postgres://postgres:postgres@db:5432/flowforge?sslmode=disable"
      WORKER_POLL_INTERVAL: "1s"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
