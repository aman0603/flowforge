version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: flowforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowforge"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: flowforge-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowforge-app
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_URL: "postgres://postgres:postgres@db:5432/flowforge?sslmode=disable"
      ENV: "development"
      SCHEMA_PATH: "schema.sql"
      REDIS_ADDR: "redis:6379"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "flowforge.workflow-events.v1"
      KAFKA_CLIENT_ID: "flowforge-app"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./worker"]
    environment:
      DB_URL: "postgres://postgres:postgres@db:5432/flowforge?sslmode=disable"
      WORKER_POLL_INTERVAL: "${WORKER_POLL_INTERVAL:-1s}"
      CLAIMED_STALE_TIMEOUT: "${CLAIMED_STALE_TIMEOUT:-30s}"
      RUNNING_STALE_TIMEOUT: "${RUNNING_STALE_TIMEOUT:-5m}"
      RECOVERY_INTERVAL: "${RECOVERY_INTERVAL:-30s}"
      REDIS_ADDR: "redis:6379"
      WORKER_HEARTBEAT_INTERVAL_MS: "${WORKER_HEARTBEAT_INTERVAL_MS:-1000}"
      WORKER_HEARTBEAT_TTL_MS: "${WORKER_HEARTBEAT_TTL_MS:-3000}"
      TASK_LEASE_TTL_MS: "${TASK_LEASE_TTL_MS:-5000}"
      TASK_LEASE_RENEW_INTERVAL_MS: "${TASK_LEASE_RENEW_INTERVAL_MS:-1500}"
      WORKER_POOL_SIZE: "${WORKER_POOL_SIZE:-16}"
      WORKER_QUEUE_CAPACITY: "${WORKER_QUEUE_CAPACITY:-32}"
      WORKER_CLAIM_BATCH_SIZE: "${WORKER_CLAIM_BATCH_SIZE:-8}"
      WORKER_SHUTDOWN_GRACE_PERIOD_MS: "${WORKER_SHUTDOWN_GRACE_PERIOD_MS:-10000}"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_TOPIC: "flowforge.workflow-events.v1"
      KAFKA_CLIENT_ID: "flowforge-worker"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata:
